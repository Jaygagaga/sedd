defaults:
  - _self_
  - model: small

ngpus: 1
tokens: 50257

training:
  batch_size: 512
  accum: 1
  n_iters: 1300001
  epochs: null
  snapshot_freq: 50000
  log_freq: 50
  eval_freq: 100
  snapshot_freq_for_preemption: 10000
  weight: standard
  snapshot_sampling: True
  ema: 0.9999
  target_only_diffusion: False
  early_stopping_patience: 2

data:
  task_type: lm
  train: openwebtext
  valid: wikitext103
  cache_dir: data
  tokenizer_name_or_path: /gpt_tokenizer
  num_workers: 4
  pin_memory: True
  persistent_workers: True
  dataset_name: simplescaling/s1K-1.1
  local_path: /root/workspace/data/train-00000-of-00001.parquet
  prompt_field: question
  target_field: solution
  answer_field: null
  max_length: 1024
  split_seed: 42

graph:
  type: absorb
  file: data
  report_all: False

noise:
  type: loglinear
  sigma_min: 1e-4
  sigma_max: 20

sampling:
  predictor: euler
  steps: 128
  noise_removal: True

eval:
  batch_size: 512
  perplexity: True
  perplexity_batch_size: 32
  answer_extraction: heuristic

optim:
  weight_decay: 0
  optimizer: AdamW
  lr: 3e-4
  beta1: 0.9
  beta2: 0.999
  eps: 1e-8
  warmup: 2500
  grad_clip: 1.

hydra:
  run:
    dir: exp_local/${data.train}/${now:%Y.%m.%d}/${now:%H%M%S}
  sweep:
    dir: exp/${data.train}/${now:%Y.%m.%d}/${now:%H%M%S}
    subdir: ${hydra.job.num}
